name: shopping-task-management
region: nyc

services:
  - name: backend
    github:
      repo: noor170/shopping
      branch: main
      deploy_on_push: true
    source_dir: /backend
    environment_slug: java
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 8080
    build_command: mvn clean package -DskipTests
    run_command: java -jar target/task-management-backend-0.0.1-SNAPSHOT.jar
    routes:
      - path: /api
      - path: /swagger-ui.html
      - path: /swagger-ui
      - path: /v3/api-docs
      - path: /actuator
      - path: /h2-console

static_sites:
  - name: frontend
    github:
      repo: noor170/shopping
      branch: main
      deploy_on_push: true
    source_dir: /frontend
    environment_slug: html
    build_command: corepack enable && yarn install --frozen-lockfile && yarn build
    output_dir: dist
    index_document: index.html
    error_document: index.html
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: /api
